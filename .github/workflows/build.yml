name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest

  python-package:
    name: Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install default server package
        run: pip install -e .

      - name: Check default install excludes agent dependencies
        run: |
          python - <<'PY'
          import importlib.util
          from app.main import app

          assert app.title == "Sidecar Deck"
          for package in ("psutil", "requests", "winrt"):
              assert importlib.util.find_spec(package) is None, f"{package} should only be installed by the agent extra"
          PY

      - name: Install agent extra
        run: pip install -e ".[agent]"

      - name: Check agent entry point
        run: |
          python -m py_compile app/agent.py
          sidecar-deck-agent --help

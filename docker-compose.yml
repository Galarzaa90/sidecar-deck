name: sidecar-deck

services:
  sidecar-deck:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sidecar-deck
    restart: unless-stopped
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
